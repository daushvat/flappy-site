<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>davushvat projects</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0b1020;
      --card: #121933;
      --text: #eef2ff;
      --muted: #b8c0e0;
      --accent: #7c9cff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #0b1020, #11182e);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(720px, 100%);
      background: rgba(18, 25, 51, 0.9);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    h1 { margin: 0 0 12px; font-size: 2.2rem; }
    p { color: var(--muted); line-height: 1.6; }
    .pill {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(124,156,255,0.16);
      color: #dbe5ff;
      font-size: 0.92rem;
      margin-bottom: 18px;
    }
    .links {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    a {
      color: white;
      text-decoration: none;
      background: var(--accent);
      padding: 10px 16px;
      border-radius: 12px;
      font-weight: 600;
    }
    .footer {
      margin-top: 24px;
      font-size: 0.92rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="pill">Personal Projects</div>
    <h1>davushvat projects</h1>
    <p>
      This is a simple landing page for personal experiments, tools, and web projects.
      More sections and project cards can be added here anytime.
    </p>
    <div class="links">
      <a href="https://github.com/daushvat" target="_blank" rel="noreferrer">GitHub profile</a>
    </div>
    <div class="footer">Deployed with GitHub Pages.</div>
  </main>
</body>
</html>
